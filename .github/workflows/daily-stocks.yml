name: Daily Stock Price Update

on:
  schedule:
    - cron: '0 9 * * *'  # Every day at 9 AM MST (4 PM UTC)
  workflow_dispatch:

jobs:
  update-stocks:
    runs-on: ubuntu-latest
    name: Update Stock Prices

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Update stock prices
        run: npm run scrape:stocks
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

      - name: Log completion
        run: |
          echo "✅ Stock prices updated"
          echo "📅 Timestamp: $(date)"
